name: Release

on:
  workflow_dispatch:
    inputs:
      auto-bump:
        type: choice
        description: "Auto Bump"
        default: "no"
        options:
          - "no"
          - "patch"
          - "minor"
      version:
        description: 'Release version (X.Y.Z), required if Auto Bump = no'
        required: false
        type: string
      notes:
        description: Optional one-line notes
        required: false
        type: string
      dry_run:
        description: Preview release without mutating/publishing
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-medium
  cancel-in-progress: false

jobs:
  auto-bump:
    runs-on: ubuntu-latest
    if: inputs.auto-bump != 'no'
    outputs:
      bumped_version: ${{ steps.bump.outputs[inputs.auto-bump] }}
    steps:
      - uses: actions/checkout@v5
      - id: get-current-version
        run: |
          echo 'current_version='$(node -p "require('./package.json').version") >> $GITHUB_OUTPUT
      - id: bump
        uses: "WyriHaximus/github-action-next-semvers@v1"
        with:
          version: ${{ steps.get-current-version.outputs.current_version }}
          bump: ${{ inputs.auto-bump }}
  ensure-version-not-exists:
    runs-on: ubuntu-latest
    if: ${{ !failure() }}
    needs: [auto-bump]
    outputs:
      final_version: ${{ steps.determine-version.outputs.final_version }}
    steps:
      - id: determine-version
        env:
          auto_bump_version: ${{ needs.auto-bump.outputs.bumped_version }}
          input_version: ${{ inputs.version }}
        run: |
          if [[ -n "$auto_bump_version" ]]; then
            echo "final_version=$auto_bump_version" >> "$GITHUB_OUTPUT"
          elif [[ -n "$input_version" ]]; then
            echo "final_version=$input_version" >> "$GITHUB_OUTPUT"
          else
            echo "Either select auto-bump or input version is required";
            exit 1;
          fi
      - id: check-version
        uses: mukunku/tag-exists-action@v1.7.0
        with:
          tag: 'v${{ steps.determine-version.outputs.final_version }}'
      - id: fail-if-version-exists
        run: |
          if [ "${{ steps.check-version.outputs.exists }}" == "true" ]; then
            echo "Version ${{ steps.determine-version.outputs.final_version }} already exists";
            exit 1;
          fi

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ensure-version-not-exists
    if: ${{ !failure() }}

    steps:
      - name: Guard dispatch branch is medium
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "medium" ]; then
            echo "This workflow must be dispatched from medium. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Checkout medium branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Create local medium branch at dispatch SHA
        run: git checkout -B medium "$GITHUB_SHA"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Assert current branch is medium
        run: |
          set -euo pipefail
          CURRENT_BRANCH="$(git branch --show-current)"
          if [ "$CURRENT_BRANCH" != "medium" ]; then
            echo "Expected branch medium, got: $CURRENT_BRANCH"
            exit 1
          fi

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Prepare release body and local release state
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          FINAL_VERSION: ${{ needs.ensure-version-not-exists.outputs.final_version }}
          RELEASE_NOTES: ${{ inputs.notes }}
          DRY_RUN: ${{ inputs.dry_run }}
          UPSTREAM_REMOTE_URL: https://github.com/alvinunreal/oh-my-opencode-slim.git
        run: |
          set -euo pipefail
          RELEASE_CI_ARGS=(--version "$FINAL_VERSION" --body-file "$RUNNER_TEMP/release-body.md")

          if [ -n "${RELEASE_NOTES}" ]; then
            RELEASE_CI_ARGS+=(--notes "$RELEASE_NOTES")
          fi

          if [ "${DRY_RUN}" = "true" ]; then
            RELEASE_CI_ARGS+=(--dry-run)
          fi

          bun run scripts/release-ci.ts "${RELEASE_CI_ARGS[@]}"

      - name: Upload release body artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-body-${{ needs.ensure-version-not-exists.outputs.final_version }}
          path: ${{ runner.temp }}/release-body.md
          if-no-files-found: error

      - name: Push release commit
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          git push origin medium

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          unset NODE_AUTH_TOKEN
          npm config delete //registry.npmjs.org/:_authToken || true
          rm -f ~/.npmrc .npmrc || true
          npm publish --provenance --access public --registry=https://registry.npmjs.org/

      - name: Push release tag
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          git push origin "v${{ needs.ensure-version-not-exists.outputs.final_version }}"
      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "v${{ needs.ensure-version-not-exists.outputs.final_version }}" --repo "${{ github.repository }}" --notes-file "$RUNNER_TEMP/release-body.md"
